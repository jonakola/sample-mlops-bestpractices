# =============================================================================
# Central Configuration for Drift Monitoring Pipeline
# =============================================================================
# Single source of truth for shared variables across pipeline stages. Each
# value here maps to a constant in src/config/config.py. Environment variables
# in .env take precedence over values defined here.
# =============================================================================

# ---------------------------------------------------------------------------
# Project
# ---------------------------------------------------------------------------
# Used to derive the account-agnostic data bucket when DATA_S3_BUCKET / s3.bucket
# are not set: ${project.name}-data-${AWS::AccountId}. Must match the
# ProjectName parameter used by the CloudFormation stack.
project:
  name: fraud-detection-monitoring

# ---------------------------------------------------------------------------
# AWS
# ---------------------------------------------------------------------------
# `region` is the data-plane region: everything you provision (SageMaker
# domain, Lambdas, S3, Athena, ECR, EventBridge) lives here. CFN, the
# notebooks, and the deploy/delete shell scripts ALL read this value
# (overridable per-run via AWS_REGION / AWS_DEFAULT_REGION env vars).
#
# `quicksight_identity_region` is independent — QuickSight has a single
# identity endpoint per account (the region where you first activated the
# subscription). ALL QuickSight API calls must hit that endpoint regardless
# of where the data lives. Default to us-east-1 since that's the most
# common identity region; override here or via QUICKSIGHT_IDENTITY_REGION
# env var if your account was activated elsewhere.
aws:
  region: us-west-2
  quicksight_identity_region: us-east-1

# ---------------------------------------------------------------------------
# SageMaker
# ---------------------------------------------------------------------------
sagemaker:
  exec_role: ""                  # ARN of the SageMaker execution role
  serverless_memory_size: 2048   # MB (1024-6144)
  serverless_max_concurrency: 5  # Max concurrent invocations (1-200)
  batch_transform_instance: ml.m5.xlarge
  batch_transform_max_concurrent: 4

# ---------------------------------------------------------------------------
# MLflow tracking server settings
# ---------------------------------------------------------------------------
mlflow:
  tracking_uri: ""               # SageMaker MLflow tracking server ARN
  experiment_name: credit-card-fraud-detection-training
  inference_experiment_name: credit-card-fraud-detection-inference
  batch_experiment_name: credit-card-fraud-detection-batch
  monitoring_experiment_name: credit-card-fraud-detection-monitoring
  # Single canonical identifier — used as both the MLflow registered-model name
  # AND the SageMaker Model Package Group name. pipeline.py's MPG parameter
  # defaults to this value; the drift Lambda reads it from MODEL_PACKAGE_GROUP env.
  model_name: fraud-detection

# ---------------------------------------------------------------------------
# Athena data lake settings
# ---------------------------------------------------------------------------
athena:
  database: fraud_detection
  workgroup: primary
  output_s3: ""                  # S3 path for Athena query results (derived from data bucket if empty)
  query_timeout: 300             # Seconds
  # All seven tables created by CloudFormation (sagemaker-mlflow-setup.yaml
  # SetupAthenaTables custom resource) and exposed as constants in config.py.
  training_table: training_data
  evaluation_table: evaluation_data
  inference_table: inference_responses
  monitoring_responses_table: monitoring_responses
  # Two ground-truth tables — `ground_truth` is the raw labels feed (one
  # row per labeled transaction), `ground_truth_updates` records the
  # ground-truth-applied audit trail per inference_id and is what the
  # drift Lambda joins against for model-drift scoring.
  ground_truth_table: ground_truth
  ground_truth_updates_table: ground_truth_updates
  drifted_data_table: drifted_data

# ---------------------------------------------------------------------------
# S3 storage
# ---------------------------------------------------------------------------
s3:
  bucket: ""                     # Data lake bucket (derived from project.name if empty)
  prefix: "fraud-detection/"
  # Per-resource paths (populated automatically from bucket + prefix if left empty)
  training_data: ""              # s3://bucket/prefix/training_data/
  ground_truth: ""               # s3://bucket/prefix/ground_truth/
  inference_responses: ""        # s3://bucket/prefix/inference_responses/
  drifted_data: ""               # s3://bucket/prefix/drifted_data/
  ground_truth_updates: ""       # s3://bucket/prefix/ground_truth_updates/
  model_artifacts: ""            # s3://bucket/prefix/model_artifacts/
  training_data_export: ""       # s3://bucket/prefix/training_data_export/
  batch_transform_input: ""      # s3://bucket/prefix/batch_transform/input/
  batch_transform_output: ""     # s3://bucket/prefix/batch_transform/output/

# ---------------------------------------------------------------------------
# SQS queue configuration
# ---------------------------------------------------------------------------
# Two SQS queues exist:
#   1. Inference-logging queue (CFN resource InferenceLoggerQueue, name
#      ${ProjectName}-inference-logging). Resolved at endpoint-deploy time —
#      notebook 2 looks it up by name and passes the URL into the container env.
#   2. Monitoring-results queue (name below). Created at runtime by
#      src/drift_monitoring/deploy_monitoring_writer.py — calls sqs.create_queue
#      with this name, then wires the queue → fraud-monitoring-results-writer
#      Lambda. Triggered from notebook 3 Section 5.2.
sqs:
  monitoring_queue_name: fraud-monitoring-results
  monitoring_queue_url: ""

# ---------------------------------------------------------------------------
# Inference logging master switch
# ---------------------------------------------------------------------------
# Container env var. When false, the inference handler returns predictions
# but skips the SQS send. Used for endpoints where you want pure inference
# without the drift-monitoring side-effects.
inference_logging:
  enable_athena_logging: "true"

# ---------------------------------------------------------------------------
# Inference confidence thresholds
# ---------------------------------------------------------------------------
inference:
  high_confidence_threshold: 0.9
  low_confidence_lower: 0.4
  low_confidence_upper: 0.6

  # ------------------------------------------------------------------
  # Prediction-output column names (BYO-dataset knobs)
  # ------------------------------------------------------------------
  # The endpoint's custom inference handler writes each prediction to the
  # inference_responses Athena table with these column names. Defaults match
  # the fraud-detection reference implementation. Change these ONLY if you
  # deploy a custom inference handler that emits differently-named columns.
  #
  # `prediction_column` is the discrete output (0/1, class label, or bucket).
  # `probability_column` is the continuous score/probability the drift monitor
  # uses for ROC-AUC and Evidently classification drift.
  # `probability_alt_column` is the "other class" probability in binary
  # classification (probability_non_fraud in the default). Leave empty for
  # non-binary targets — nothing downstream requires it.
  prediction_column: "prediction"
  probability_column: "probability_fraud"
  probability_alt_column: "probability_non_fraud"

# ---------------------------------------------------------------------------
# Lambda configuration
# ---------------------------------------------------------------------------
# Three Lambdas in this project (none of their names are configurable here —
# they're set in their respective deployers/CFN):
#
#   inference-logger  (${ProjectName}-inference-logger)
#     CloudFormation-provisioned (sagemaker-mlflow-setup.yaml →
#     InferenceLoggerFunction). Drains the inference-logging SQS queue into
#     the inference_responses Athena table.
#
#   monitoring-writer (fraud-monitoring-results-writer)
#     Out-of-band — deployed by src/drift_monitoring/deploy_monitoring_writer.py,
#     invoked from notebook 3 Section 5.2. Drains the monitoring-results SQS
#     queue (above) into monitoring_responses + back-fills monitoring_run_id
#     on inference_responses.
#
#   drift-monitor    (fraud-detection-drift-monitor)
#     Out-of-band container image — built+pushed via CodeBuild and deployed
#     by scripts/deploy_lambda_container.sh, invoked from notebook 3
#     Section 7.2. Runs Evidently data + model drift on a daily EventBridge
#     schedule; SQS-sends the result for monitoring-writer to persist.
lambda:
  exec_role: ""                  # ARN of the Lambda execution role

# ---------------------------------------------------------------------------
# Data file paths
# ---------------------------------------------------------------------------
# Training data is downloaded from Kaggle at runtime by
# src/setup/download_kaggle_dataset.py — the local CSVs below are NOT in the
# repo and only materialize if you run that script.
#
# Drifted data is generated at runtime by src/drift_monitoring/generate_drift_dataset.py
# (see drift_generation block further down) and written to
# data/creditcard_drifted.csv.
#
# Ground truth is generated at runtime by
# src/drift_monitoring/simulate_ground_truth_from_athena.py (notebook 3
# Section 4) and written directly to the ground_truth_updates Athena table —
# no local CSV.
#
# Pipeline + Athena code use the S3 paths below, not the local files.
data:
  # CSV defaults referenced only by:
  #   src/setup/setup_athena_tables.py (legacy bulk-load path)
  #   src/train_pipeline/athena/data_migrator.py (one-off Athena bootstrap)
  # The normal flow (notebook 1 → Kaggle download → train) never reads these.
  csv_training_data: "data/creditcard_predictions_final.csv"
  csv_ground_truth: "data/creditcard_ground_truth.csv"
  csv_drifted_data: "data/creditcard_drifted.csv"
  # S3 locations (populated automatically from bucket + prefix if left empty)
  s3_training_data: ""
  s3_ground_truth: ""
  s3_drifted_data: ""

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
# Target column, feature list, and column-rename map live in code, not here —
# changing them requires updating preprocessing + the training pipeline:
#   - target_column / features → src/config/dataset_schema.yaml (read via
#     src.config.schema.target_column() / schema.feature_names())
#   - Kaggle-column → project-column rename map → src/setup/download_kaggle_dataset.py
# Only XGBoost hyperparameters live in this section because they're tunable
# without re-deriving the dataset.
training:
  random_state: 42
  # XGBoost hyperparameters tuned for severe class imbalance (~580:1 in the
  # Kaggle credit-card fraud dataset). Shallow trees + larger min_child_weight
  # + early stopping prevent the model from memorizing the small positive class
  # (≈394 training rows) and driving test AUC to ~0.5.
  xgboost_params:
    max_depth: 4
    learning_rate: 0.05
    num_boost_round: 200            # ceiling; early stopping typically halts sooner
    min_child_weight: 10
    early_stopping_rounds: 20
    subsample: 0.8
    colsample_bytree: 0.8
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    eval_metric: "auc"

  # ------------------------------------------------------------------
  # XGBoost objective override (BYO-dataset knob)
  # ------------------------------------------------------------------
  # Leave `objective` empty to auto-derive from schema.target_type():
  #   boolean → 'binary:logistic' with scale_pos_weight class-imbalance handling
  #   integer → 'multi:softprob' (also set num_class below)
  #   double  → 'reg:squarederror' (regression; disables scale_pos_weight)
  # Explicit override wins — set this if your target's XGBoost objective isn't
  # covered by the auto-map (e.g. 'reg:logistic', 'multi:softmax',
  # 'binary:hinge', 'rank:pairwise').
  objective: ""
  # Only used when objective is 'multi:softprob' or 'multi:softmax'. Number of
  # distinct classes in your target column. Required for multi-class; unused
  # otherwise.
  num_class: 0

# ---------------------------------------------------------------------------
# Drift detection thresholds
# ---------------------------------------------------------------------------
# Read into config.py as MIN_ROC_AUC_THRESHOLD / DATA_DRIFT_THRESHOLD /
# MODEL_DRIFT_THRESHOLD. Consumers:
#   - src/drift_monitoring/monitor_model_performance.py (in-notebook drift run)
#   - notebook 3 Section 6.5 (alert summary) + Section 7.1 (deploy banner)
#
# NOT read by the daily fraud-detection-drift-monitor Lambda — that one
# reads its thresholds (DATA_DRIFT_THRESHOLD, KS_PVALUE_THRESHOLD,
# MODEL_DRIFT_THRESHOLD, DATA_DRIFT_LOOKBACK_DAYS, MODEL_DRIFT_LOOKBACK_DAYS)
# from its own Lambda env vars set by scripts/deploy_lambda_container.sh.
# To tune the deployed Lambda, redeploy with new env vars; this YAML only
# affects in-notebook checks.
drift_thresholds:
  # Minimum acceptable ROC-AUC before alerting (monitor_model_performance.py)
  min_roc_auc: 0.85
  # Data-drift alarm: fraction of features whose distribution moved
  # (Evidently DataDriftPreset). 0.2 = alert if 20% of features drifted.
  data_drift: 0.20
  # Model-drift alarm: relative ROC-AUC degradation vs the baseline.
  # 0.05 = alert if AUC drops by 5 percentage points or more.
  model_drift: 0.05

# Schedule for the daily drift-monitor Lambda (EventBridge cron expression).
# Read by notebook 3 Section 7.1 as DRIFT_MONITOR_SCHEDULE for display. The
# actual EventBridge rule is created by scripts/deploy_lambda_container.sh
# which reads its own EVENTBRIDGE_SCHEDULE env var (same default), so to
# truly override the schedule both this value AND that env var must change.
drift_monitor:
  schedule: "cron(0 2 * * ? *)"  # Daily at 2 AM UTC

# ---------------------------------------------------------------------------
# Drift dataset generation (for testing the monitoring pipeline)
# ---------------------------------------------------------------------------
# Used by src/drift_monitoring/generate_drift_dataset.py to fabricate a
# drifted CSV that exercises the drift detector. One scenario only —
# easier to explain in monitoring outputs.
#
# Drift types:
#   multiplicative: new_value = original × (factor ± noise × factor)
#   additive:       new_value = original + (shift ± noise)
drift_generation:
  num_samples: 5000
  random_state: 123

  # Drift applied to 5 key features
  default_drift:
    transaction_amount:
      type: "multiplicative"
      factor: 1.1
      noise: 0.05
    transaction_timestamp:
      type: "additive"
      shift: 10000
      noise: 1000
    distance_from_home_km:
      type: "multiplicative"
      factor: 1.2
      noise: 0.1
    velocity_score:
      type: "multiplicative"
      factor: 1.15
      noise: 0.1
    num_transactions_24h:
      type: "additive"
      shift: 1
      noise: 0.5

# QuickSight resource IDs (datasource/dataset/analysis/dashboard) and the
# QuickSight service-role name are constants in src/config/config.py
# (QUICKSIGHT_*). They are NOT duplicated in this YAML because they should
# be stable across environments — changing them would orphan existing
# datasets/dashboards.

# ---------------------------------------------------------------------------
# SHAP explainability
# ---------------------------------------------------------------------------
shap:
  background_samples: 500
  max_display_features: 20
  check_additivity: false
  random_state: 42
  output_dir: "shap_output/"
