# =============================================================================
# Central Configuration for Drift Monitoring Pipeline
# =============================================================================
# Single source of truth for shared variables across pipeline stages. Each
# value here maps to a constant in src/config/config.py. Environment variables
# in .env take precedence over values defined here.
# =============================================================================

# ---------------------------------------------------------------------------
# Project
# ---------------------------------------------------------------------------
# Used to derive the account-agnostic data bucket when DATA_S3_BUCKET / s3.bucket
# are not set: ${project.name}-data-${AWS::AccountId}. Must match the
# ProjectName parameter used by the CloudFormation stack.
project:
  name: fraud-detection-monitoring

# ---------------------------------------------------------------------------
# AWS
# ---------------------------------------------------------------------------
aws:
  region: us-east-1

# ---------------------------------------------------------------------------
# SageMaker
# ---------------------------------------------------------------------------
sagemaker:
  exec_role: ""                  # ARN of the SageMaker execution role
  serverless_memory_size: 2048   # MB (1024-6144)
  serverless_max_concurrency: 5  # Max concurrent invocations (1-200)
  batch_transform_instance: ml.m5.xlarge
  batch_transform_max_concurrent: 4

# ---------------------------------------------------------------------------
# MLflow tracking server settings
# ---------------------------------------------------------------------------
mlflow:
  tracking_uri: ""               # SageMaker MLflow tracking server ARN
  experiment_name: credit-card-fraud-detection-training
  inference_experiment_name: credit-card-fraud-detection-inference
  batch_experiment_name: credit-card-fraud-detection-batch
  monitoring_experiment_name: credit-card-fraud-detection-monitoring
  model_name: xgboost-fraud-detector

# ---------------------------------------------------------------------------
# Athena data lake settings
# ---------------------------------------------------------------------------
athena:
  database: fraud_detection
  workgroup: primary
  output_s3: ""                  # S3 path for Athena query results (derived from data bucket if empty)
  query_timeout: 300             # Seconds
  training_table: training_data
  evaluation_table: evaluation_data
  inference_table: inference_responses
  ground_truth_table: ground_truth
  ground_truth_updates_table: ground_truth_updates
  drifted_data_table: drifted_data
  # monitoring_responses_table is hardcoded in deploy_monitoring_writer.py
  # (inline Lambda code, override via MONITORING_TABLE_NAME env var).

# ---------------------------------------------------------------------------
# S3 storage
# ---------------------------------------------------------------------------
s3:
  bucket: ""                     # Data lake bucket (derived from project.name if empty)
  prefix: "fraud-detection/"
  # Per-resource paths (populated automatically from bucket + prefix if left empty)
  training_data: ""              # s3://bucket/prefix/training_data/
  ground_truth: ""               # s3://bucket/prefix/ground_truth/
  inference_responses: ""        # s3://bucket/prefix/inference_responses/
  drifted_data: ""               # s3://bucket/prefix/drifted_data/
  ground_truth_updates: ""       # s3://bucket/prefix/ground_truth_updates/
  model_artifacts: ""            # s3://bucket/prefix/model_artifacts/
  training_data_export: ""       # s3://bucket/prefix/training_data_export/
  batch_transform_input: ""      # s3://bucket/prefix/batch_transform/input/
  batch_transform_output: ""     # s3://bucket/prefix/batch_transform/output/

# ---------------------------------------------------------------------------
# SQS queue configuration
# ---------------------------------------------------------------------------
# Inference-logging queue (CFN resource InferenceLoggerQueue, name
# ${ProjectName}-inference-logging) is resolved at endpoint-deploy time —
# notebook 2 looks it up by name and passes the URL into the container env.
# The monitoring-results queue below is created by notebook 3 (Section 5).
sqs:
  monitoring_queue_name: fraud-monitoring-results
  monitoring_queue_url: ""

# ---------------------------------------------------------------------------
# Inference logging master switch
# ---------------------------------------------------------------------------
# Container env var. When false, the inference handler returns predictions
# but skips the SQS send. Used for endpoints where you want pure inference
# without the drift-monitoring side-effects.
inference_logging:
  enable_athena_logging: "true"

# ---------------------------------------------------------------------------
# Inference confidence thresholds
# ---------------------------------------------------------------------------
inference:
  high_confidence_threshold: 0.9
  low_confidence_lower: 0.4
  low_confidence_upper: 0.6

# ---------------------------------------------------------------------------
# Lambda configuration
# ---------------------------------------------------------------------------
# inference-logger (${ProjectName}-inference-logger): CloudFormation-provisioned
#   (cloudformation/sagemaker-mlflow-setup.yaml → InferenceLoggerFunction).
# monitoring-writer (fraud-monitoring-results-writer): deployed by
#   src/drift_monitoring/deploy_monitoring_writer.py (notebook 3 Section 5).
# drift-monitor (fraud-detection-drift-monitor): deployed as a container image
#   by scripts/deploy_lambda_container.sh (notebook 3 Section 7).
lambda:
  exec_role: ""                  # ARN of the Lambda execution role

# ---------------------------------------------------------------------------
# Data file paths
# ---------------------------------------------------------------------------
# Local paths are relative to project root (used only by upload_data_to_s3.py
# and download_kaggle_dataset.py). Pipeline/Athena code uses the S3 paths below.
data:
  csv_training_data: "data/creditcard_predictions_final.csv"
  csv_ground_truth: "data/creditcard_ground_truth.csv"
  csv_drifted_data: "data/creditcard_drifted.csv"
  # S3 locations (populated automatically from bucket + prefix if left empty)
  s3_training_data: ""
  s3_ground_truth: ""
  s3_drifted_data: ""

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
# Target column, test split, and feature list are defined in
# src/setup/download_kaggle_dataset.py (the column-rename map) and the preprocessing
# step. Only XGBoost hyperparameters live here because they need to be
# tunable without re-deriving the dataset.
training:
  random_state: 42
  # XGBoost hyperparameters tuned for severe class imbalance (~580:1 in the
  # Kaggle credit-card fraud dataset). Shallow trees + larger min_child_weight
  # + early stopping prevent the model from memorizing the small positive class
  # (≈394 training rows) and driving test AUC to ~0.5.
  xgboost_params:
    max_depth: 4
    learning_rate: 0.05
    num_boost_round: 200            # ceiling; early stopping typically halts sooner
    min_child_weight: 10
    early_stopping_rounds: 20
    subsample: 0.8
    colsample_bytree: 0.8
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    eval_metric: "auc"

# ---------------------------------------------------------------------------
# Drift detection thresholds (used by monitor_model_performance.py)
# ---------------------------------------------------------------------------
# Note: the daily drift Lambda (fraud-detection-drift-monitor) does NOT read
# these — it reads DATA_DRIFT_THRESHOLD / KS_PVALUE_THRESHOLD / MODEL_DRIFT_THRESHOLD
# / DATA_DRIFT_LOOKBACK_DAYS / MODEL_DRIFT_LOOKBACK_DAYS from its Lambda
# environment variables (set at deploy time). To tune the Lambda, update its
# environment configuration, not this file.
drift_thresholds:
  # Minimum acceptable ROC-AUC before alerting (monitor_model_performance.py)
  min_roc_auc: 0.85
  # Data-drift alarm: fraction of features whose distribution moved
  # (Evidently DataDriftPreset). 0.2 = alert if 20% of features drifted.
  data_drift: 0.20
  # Model-drift alarm: relative ROC-AUC degradation vs the baseline.
  # 0.05 = alert if AUC drops by 5 percentage points or more.
  model_drift: 0.05

# Schedule for the daily drift-monitor Lambda (EventBridge expression).
# Notebook deploys the rule with this expression; the Lambda binary itself
# does not read this — it is invoked on the schedule.
drift_monitor:
  schedule: "cron(0 2 * * ? *)"  # Daily at 2 AM UTC

# ---------------------------------------------------------------------------
# Drift dataset generation (for testing the monitoring pipeline)
# ---------------------------------------------------------------------------
# Used by src/drift_monitoring/generate_drift_dataset.py to fabricate a
# drifted CSV that exercises the drift detector. One scenario only —
# easier to explain in monitoring outputs.
#
# Drift types:
#   multiplicative: new_value = original × (factor ± noise × factor)
#   additive:       new_value = original + (shift ± noise)
drift_generation:
  num_samples: 5000
  random_state: 123

  # Drift applied to 5 key features
  default_drift:
    transaction_amount:
      type: "multiplicative"
      factor: 1.1
      noise: 0.05
    transaction_timestamp:
      type: "additive"
      shift: 10000
      noise: 1000
    distance_from_home_km:
      type: "multiplicative"
      factor: 1.2
      noise: 0.1
    velocity_score:
      type: "multiplicative"
      factor: 1.15
      noise: 0.1
    num_transactions_24h:
      type: "additive"
      shift: 1
      noise: 0.5

# QuickSight resource IDs and display names are defined directly in
# src/governance/setup_quicksight_governance.py (no YAML duplication).

# ---------------------------------------------------------------------------
# SHAP explainability
# ---------------------------------------------------------------------------
shap:
  background_samples: 500
  max_display_features: 20
  check_additivity: false
  random_state: 42
  output_dir: "shap_output/"
